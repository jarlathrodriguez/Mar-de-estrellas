<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mar de estrellas</title>
<link rel="icon" href="./datos/if-word-4-2875642_88216.ico">

<style>
html, body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  height:100%;
}

canvas{
  display:block;
}

#startBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:18px 40px;
  background:white;
  color:black;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 25px white;
  z-index:10;
}

@media (max-width:600px){
  #startBtn{
    padding:14px 28px;
    font-size:16px;
  }
}
</style>
</head>

<body>

<button id="startBtn">Iniciar ✨</button>

<audio id="music" loop>
  <source src="./datos/OnMusic - Te Queda Bonito  (Video Lyrics).mp3" type="audio/mpeg">
</audio>

<canvas id="stars"></canvas>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

window.addEventListener("resize",()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  createStars();
});

let forming = false;
let redMode = false;
let colorProgress = 0;

const STAR_COUNT = window.innerWidth < 600 ? 1000 : 2000;

let stars = [];

let words = [
  "TE QUIERO",
  "MI NIÑA",
  "PRECIOSA",
  "GRACIAS",
  "POR EXISTIR",
  "ESPERO",
  "TE GUSTE",
  "LA CANSION"
];

let wordIndex = 0;

let mouse = {x:-1000,y:-1000};

document.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

class Star{
  constructor(){
    this.reset();
    this.tx=this.x;
    this.ty=this.y;
  }

  reset(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.radius=Math.random()*1.5+0.3;
    this.speed=Math.random()*1.5+0.8;
    this.alpha=Math.random();
    this.wave=Math.random()*Math.PI*2;
    this.vx=0;
    this.vy=0;
  }

  update(){

    this.y-=this.speed;
    this.wave+=0.02;
    this.x+=Math.sin(this.wave)*0.5;

    if(forming){
      this.vx+=(this.tx-this.x)*0.03;
      this.vy+=(this.ty-this.y)*0.03;
    }

    let dx=this.x-mouse.x;
    let dy=this.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<80){
      this.vx+=dx*0.02;
      this.vy+=dy*0.02;
    }

    this.x+=this.vx;
    this.y+=this.vy;

    this.vx*=0.9;
    this.vy*=0.9;

    if(redMode && colorProgress<1) colorProgress+=0.02;
    if(!redMode && colorProgress>0) colorProgress-=0.02;

    this.alpha=0.4+Math.sin(this.wave)*0.6;

    if(this.y<0){
      this.y=canvas.height;
      this.x=Math.random()*canvas.width;
    }
  }

  draw(){
    ctx.beginPath();
    ctx.shadowBlur=20;

    let r=255;
    let g=255-(205*colorProgress);
    let b=255-(205*colorProgress);

    ctx.shadowColor=`rgb(${r},${g},${b})`;
    ctx.fillStyle=`rgba(${r},${g},${b},${this.alpha})`;

    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fill();
  }
}

function createStars(){
  stars=[];
  for(let i=0;i<STAR_COUNT;i++){
    stars.push(new Star());
  }
}

function getTextPoints(text){
  let off=document.createElement("canvas");
  off.width=canvas.width;
  off.height=canvas.height;
  let octx=off.getContext("2d");

  let fontSize=window.innerWidth<600?60:120;

  octx.fillStyle="white";
  octx.font="bold "+fontSize+"px Arial";
  octx.textAlign="center";
  octx.fillText(text,canvas.width/2,canvas.height/2);

  let data=octx.getImageData(0,0,off.width,off.height).data;
  let points=[];

  for(let y=0;y<off.height;y+=6){
    for(let x=0;x<off.width;x+=6){
      if(data[(y*off.width+x)*4+3]>150){
        points.push({x,y});
      }
    }
  }
  return points;
}

function formWord(text){
  let points=getTextPoints(text);
  stars.forEach((star,i)=>{
    let p=points[i%points.length];
    star.tx=p.x;
    star.ty=p.y;
  });
}

function formHeart(){
  let points=[];
  let scale=window.innerWidth<600?10:15;
  let centerX=canvas.width/2;
  let centerY=canvas.height/2;

  for(let t=0;t<Math.PI*2;t+=0.02){
    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    points.push({
      x:centerX+x*scale,
      y:centerY+y*scale
    });
  }

  stars.forEach((star,i)=>{
    let p=points[i%points.length];
    star.tx=p.x;
    star.ty=p.y;
  });
}

function showWords(){
  if(wordIndex<words.length){
    formWord(words[wordIndex]);
    wordIndex++;
    setTimeout(showWords,5000); //tiempo de las palabras 
    
  }else{
    formHeart();
    setTimeout(()=>{
      forming=false;
      redMode=false;
    },4000);
  }
}

document.getElementById("startBtn").onclick=()=>{
  forming=true;
  redMode=true;
  wordIndex=0;

  document.getElementById("startBtn").style.display="none";
  document.getElementById("music").play();

  showWords();
};

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(star=>{
    star.update();
    star.draw();
  });

  requestAnimationFrame(animate);
}

createStars();
animate();
</script>

</body>
</html>
